# Puerto dinámico para el hosting
server.port=${PORT:8080}

# Conexión a PostgreSQL adaptada a las variables nativas de Render
# (Si Render te da la URL completa en DATABASE_URL, Spring Boot la leerá directamente)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/finq_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update 

# Mostrar el SQL en la consola 
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
